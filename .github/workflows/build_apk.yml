name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  # This fixes the Node 20/24 issue you found!
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Fix Project & Unzip Files
        run: |
          # 1. Check if lib.zip exists and unzip it
          if [ -f "lib.zip" ]; then
            unzip -o lib.zip
            echo "Successfully unzipped lib.zip"
          fi

          # 2. If pubspec.yaml is missing, create a fresh project structure
          if [ ! -f "pubspec.yaml" ]; then
            flutter create --project-name smart_pantry --org com.smartpantry .
          fi
          
          # 3. Set Min SDK to 21 (Required for the Scanning AI)
          if [ -f "android/app/build.gradle" ]; then
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
          fi

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: smart-pantry-apk
          path: build/app/outputs/flutter-apk/app-release.apk
