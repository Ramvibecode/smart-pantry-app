name: Build APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Android Folder
        run: |
          # Only runs if the android folder is missing
          if [ ! -d "android" ]; then
            flutter create --project-name smart_pantry --org com.example .
          fi

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --no-pub

      - name: Upload Result
        uses: actions/upload-artifact@v3
        with:
          name: smart-pantry-apk
          path: build/app/outputs/flutter-apk/app-release.apk
