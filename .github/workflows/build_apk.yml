name: Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

env:
  # This fixes the Node20 deprecation you found!
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Fix Project & SDK
        run: |
          # 1. If files are missing, create a fresh project structure
          if [ ! -f "pubspec.yaml" ]; then
            flutter create --project-name smart_pantry --org com.smartpantry .
          fi
          
          # 2. Fix the SDK version (Required for the Scanning AI)
          if [ -f "android/app/build.gradle" ]; then
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 21/g' android/app/build.gradle
          fi

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: smart-pantry-apk
          path: build/app/outputs/flutter-apk/app-release.apk
