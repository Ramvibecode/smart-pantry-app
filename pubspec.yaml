name: smart_pantry
description: A new Flutter project for pantry and medicine management.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_ml_kit: ^0.13.0
  camera: ^0.10.5+2
  permission_handler: ^11.0.1
  path_provider: ^2.1.1
  firebase_core: ^2.15.0
  cloud_firestore: ^4.8.3
  firebase_auth: ^4.7.2
  google_fonts: ^5.1.0
  provider: ^6.0.5
  intl: ^0.18.1
  url_launcher: ^6.1.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
